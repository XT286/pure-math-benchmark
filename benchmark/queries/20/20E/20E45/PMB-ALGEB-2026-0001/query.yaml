statement:
  title: Finitely generated torsion linear groups are finite
  body: Suppose G is a finitely generated subgroup of GL_n(C) and every element of
    G has finite order. Decide whether G must be finite and justify your answer
    by invoking an appropriate structural theorem or argument.
  notation_conventions:
    - GL_n(C) is the group of invertible complex n by n matrices
  definitions_included: true
  prerequisites_assumed:
    - basic linear algebraic group notions
    - standard structural results for linear groups
goal:
  success_criteria: The answer should conclude that G is finite and justify this
    using a valid theorem such as Schur's theorem on finitely generated torsion
    linear groups or an equivalent argument.
  forbidden_shortcuts:
    - asserting Burnside without enough context to support the conclusion
