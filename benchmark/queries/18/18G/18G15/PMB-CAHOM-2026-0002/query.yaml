statement:
  title: Vanishing of Ext^1 and splitting of short exact sequences
  body: Let 0 -> N -> E -> M -> 0 be a short exact sequence of modules over a ring
    R. Explain why the condition Ext_R^1(M,N)=0 forces the sequence to split.
  notation_conventions:
    - Ext_R^1 is Yoneda Ext
  definitions_included: true
  prerequisites_assumed:
    - short exact sequences
    - Ext as extension classes
goal:
  success_criteria: The answer should explain that equivalence classes of
    extensions of M by N are classified by Ext_R^1(M,N), so vanishing means the
    given extension class is zero and hence split.
  forbidden_shortcuts:
    - claiming split exactness without mentioning the extension-class
      interpretation
