statement:
  title: Spectrum of a self-adjoint element in a C-star algebra
  body: Let a be a self-adjoint element of a unital C-star algebra. Explain why
    the spectrum of a is contained in the real line.
  notation_conventions:
    - self-adjoint means a*=a
  definitions_included: true
  prerequisites_assumed:
    - basic C-star algebra theory
    - spectrum and resolvent
goal:
  success_criteria: The answer should show that if lambda has nonzero imaginary
    part then (a-lambda 1)^*(a-lambda 1) is invertible, hence a-lambda 1 is
    invertible, so lambda is not in the spectrum.
  forbidden_shortcuts:
    - asserting the spectral theorem for Hilbert space operators without
      adapting it to general C-star algebras
