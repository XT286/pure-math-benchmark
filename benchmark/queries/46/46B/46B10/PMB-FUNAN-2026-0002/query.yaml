statement:
  title: Why every finite-dimensional normed space is reflexive
  body: Explain why every finite-dimensional normed vector space is reflexive, and
    indicate which step fails in infinite dimension.
  notation_conventions:
    - reflexive means the canonical map into the bidual is surjective
  definitions_included: true
  prerequisites_assumed:
    - basic Banach space duality
    - finite-dimensional linear algebra
goal:
  success_criteria: The answer should explain that the canonical embedding into
    the bidual is always isometric, and in finite dimension domain and codomain
    have the same finite dimension, so the map is onto. It should also note that
    dimension equality fails in infinite dimension.
  forbidden_shortcuts:
    - saying finite-dimensional spaces are all isomorphic to Euclidean space
      without tying this to the bidual map
