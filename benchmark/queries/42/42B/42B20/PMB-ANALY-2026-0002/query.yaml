statement:
  title: Why boundedness on L^2 matters for singular integrals
  body: Suppose T is a Calderon-Zygmund singular integral operator initially
    defined on smooth compactly supported functions, and assume the standard
    kernel estimates together with boundedness on L^2(R^n). Explain why one then
    expects boundedness on L^p(R^n) for 1<p<infty.
  notation_conventions:
    - L^p means Lebesgue spaces on R^n
  definitions_included: true
  prerequisites_assumed:
    - Calderon-Zygmund theory
    - interpolation and weak-type estimates
goal:
  success_criteria: The answer should identify the Calderon-Zygmund theorem or
    T1/Tb-type paradigm in the classical setting, explaining that L^2
    boundedness together with kernel control yields weak-(1,1) and interpolation
    or extrapolation to L^p boundedness for the full range 1<p<infty.
  forbidden_shortcuts:
    - claiming interpolation alone gives the result without the endpoint input
