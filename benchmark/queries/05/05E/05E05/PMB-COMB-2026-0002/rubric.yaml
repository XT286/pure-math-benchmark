success_criteria: The answer should invoke the Littlewood-Richardson rule or an
  equivalent representation-theoretic interpretation and explain that the
  coefficients count combinatorial objects or multiplicities, hence are
  nonnegative integers.
required_elements:
  - The answer should invoke the Littlewood-Richardson rule or an equivalent
    representation-theoretic interpretation and explain that the coefficients
    count combinatorial objects or multiplicities, hence are nonnegative
    integers.
alternate_valid_approaches: []
fatal_errors:
  - stating positivity as a known fact without the mechanism
  - equates positivity with monomial positivity
  - mentions LR rule without saying what is counted
partial_credit_guidance:
  - Credit mathematically meaningful progress that establishes a valid proof
    skeleton or isolates the correct obstruction.
  - Do not grant high credit for citation-only responses or vague references to
    standard methods.
