statement:
  title: Preservation of uncountable cofinality under ccc forcing
  body: Let P be a ccc forcing notion over a ground model V. Explain why forcing
    with P does not collapse omega_1^V to become countable in the extension.
  notation_conventions:
    - ccc means every antichain is countable
  definitions_included: true
  prerequisites_assumed:
    - basic forcing
    - names and countable maximal antichains
goal:
  success_criteria: The answer should explain that a ccc forcing cannot add a
    countable cofinal sequence through the ground-model omega_1 because deciding
    the values of a name for such a sequence would lead to a countable union of
    countable sets in the ground model, contradicting uncountability.
  forbidden_shortcuts:
    - stating 'ccc preserves cardinals' without specifying the omega_1 argument
