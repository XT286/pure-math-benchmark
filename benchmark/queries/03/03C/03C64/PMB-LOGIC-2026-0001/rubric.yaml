rubric_id: RUBRIC-PMB-LOGIC-2026-0001
query_id: PMB-LOGIC-2026-0001
owning_area_code: 03Cxx
rubric_basis: proof-rubric-v0
rubric_focus:
  problem_type: theorem_applicability
  answer_format: short_justification
  primary_metric: correctness
  secondary_metrics:
    - argument_quality
    - use_of_definitions
success_criteria: The answer should conclude that the claim is impossible and
  explain that a definable subset of the line is a finite union of points and
  intervals, ruling out an infinite discrete definable subset.
required_elements:
  - one-variable cell decomposition or monotonicity consequences
  - finite union of points and intervals characterization
alternate_valid_approaches: []
fatal_errors:
  - citation-only answer without explanation
  - asserts countable sets are allowed because countable unions of points are
    definable
  - mentions cell decomposition without connecting it to the conclusion
partial_credit_guidance:
  - Credit mathematically meaningful progress that establishes a valid proof
    skeleton or isolates the correct obstruction.
  - Do not grant high credit for citation-only responses or vague references to
    standard methods.
