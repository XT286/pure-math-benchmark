statement:
  title: Bonnet-Myers and compactness
  body: Let M be a complete Riemannian manifold with Ricci curvature bounded below
    by (n-1)k > 0. Explain why M must be compact.
  notation_conventions:
    - Ricci lower bound is in the usual tensor sense
  definitions_included: true
  prerequisites_assumed:
    - basic Riemannian geometry
    - Bonnet-Myers theorem
goal:
  success_criteria: The answer should identify Bonnet-Myers as the key theorem and
    explain that the positive Ricci lower bound gives a finite diameter bound
    for complete manifolds, hence compactness by completeness and total
    boundedness in the Riemannian setting.
  forbidden_shortcuts:
    - citing Bonnet-Myers without stating the compactness consequence it gives
