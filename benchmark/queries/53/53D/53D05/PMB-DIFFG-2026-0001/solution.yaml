outline_summary: If omega=dalpha, then omega^n=d(alpha wedge omega^(n-1)).
  Integrating over a compact boundaryless manifold gives zero by Stokes. But
  omega^n is a positive volume form for a symplectic structure, so its integral
  is positive, a contradiction. The compact boundaryless hypothesis is
  essential.
required_ingredients:
  - Stokes theorem
  - omega^n as positive volume form
common_failure_modes:
  - omitting the boundaryless assumption
  - not explaining positivity of the top wedge
