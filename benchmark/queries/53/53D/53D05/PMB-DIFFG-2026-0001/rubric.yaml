success_criteria: The answer should conclude that omega cannot be exact on a
  closed symplectic manifold because if omega=dalpha, then integral of omega^n
  equals integral of d(alpha wedge omega^(n-1)), which vanishes by Stokes,
  contradicting positivity of symplectic volume.
required_elements:
  - Stokes theorem
  - omega^n as positive volume form
alternate_valid_approaches: []
fatal_errors:
  - asserting nonexactness without using compactness and no-boundary
  - forgets compactness or boundarylessness
  - states volume positivity without relating it to Stokes
partial_credit_guidance:
