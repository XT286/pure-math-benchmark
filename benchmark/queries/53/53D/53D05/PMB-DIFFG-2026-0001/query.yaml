statement:
  title: Exactness on a closed symplectic manifold
  body: Let (M,omega) be a compact symplectic manifold without boundary. Can omega
    be exact? Give a justification that makes clear which geometric hypothesis
    is doing the work.
  notation_conventions:
    - closed means compact and without boundary
  definitions_included: true
  prerequisites_assumed:
    - Stokes theorem
    - symplectic volume form omega^n
goal:
  success_criteria: The answer should conclude that omega cannot be exact on a
    closed symplectic manifold because if omega=dalpha, then integral of omega^n
    equals integral of d(alpha wedge omega^(n-1)), which vanishes by Stokes,
    contradicting positivity of symplectic volume.
  forbidden_shortcuts:
    - asserting nonexactness without using compactness and no-boundary
