outline_summary: For n at least two, Hartogs extension applies to holomorphic
  functions on the complement of a compact set with connected complement in C^n.
  Thus every such function extends holomorphically across K. A correct answer
  should emphasize the several-complex-variables phenomenon absent in one
  variable.
required_ingredients:
  - Hartogs extension theorem
  - connected complement condition
common_failure_modes:
