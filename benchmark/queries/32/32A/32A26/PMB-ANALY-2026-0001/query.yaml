statement:
  title: Hartogs extension across a compact set
  body: Let K be a compact subset of C^n with n at least 2, and assume C^n minus K
    is connected. Explain why every holomorphic function on C^n \ K extends
    holomorphically to all of C^n.
  notation_conventions:
    - C^n \ K denotes the complement of K
  definitions_included: true
  prerequisites_assumed:
    - basic several complex variables
    - Hartogs extension phenomenon
goal:
  success_criteria: The answer should identify Hartogs extension as the relevant
    theorem and explain that in several complex variables, unlike one complex
    variable, isolated compact holes in a connected complement do not obstruct
    global extension.
  forbidden_shortcuts:
    - claiming removable singularity theorem from one variable without
      addressing the higher-dimensional phenomenon
