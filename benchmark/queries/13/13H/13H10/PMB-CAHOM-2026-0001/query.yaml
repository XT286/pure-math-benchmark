statement:
  title: Maximal Cohen-Macaulay modules over a regular local ring
  body: Let R be a regular local ring and M a finitely generated R-module with
    depth_R(M)=dim(R). Explain why M must be free. A complete proof is not
    required, but the argument should identify the structural theorem that
    closes the reasoning.
  notation_conventions:
    - depth_R(M) is the module depth over R
  definitions_included: true
  prerequisites_assumed:
    - regular local rings
    - Auslander-Buchsbaum formula
    - projective dimension
goal:
  success_criteria: The answer should identify M as maximal Cohen-Macaulay, use
    that regular local rings have finite global dimension, deduce pd_R(M) is
    finite, and then apply Auslander-Buchsbaum to obtain pd_R(M)=0 and hence
    freeness.
  forbidden_shortcuts:
    - claiming all maximal Cohen-Macaulay modules are free without using
      regularity
