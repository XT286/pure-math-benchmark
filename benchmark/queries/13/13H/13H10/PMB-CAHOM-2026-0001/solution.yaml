outline_summary: Because R is regular local, every finitely generated module has
  finite projective dimension. Since depth_R(M)=dim(R)=depth(R), the
  Auslander-Buchsbaum formula gives pd_R(M)=0. Hence M is projective, and over a
  local ring projective modules are free.
required_ingredients:
  - finite projective dimension over regular local rings
  - Auslander-Buchsbaum formula
  - projective over local implies free
common_failure_modes:
  - claiming maximal Cohen-Macaulay alone forces freeness
  - forgetting the local criterion for projective implies free
