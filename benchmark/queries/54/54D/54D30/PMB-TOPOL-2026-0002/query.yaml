statement:
  title: Compact subsets of Hausdorff spaces are closed
  body: Give a proof outline showing that every compact subset K of a Hausdorff
    space X is closed. The argument should make clear exactly where the
    Hausdorff hypothesis is used.
  notation_conventions:
    - compact means every open cover admits a finite subcover
  definitions_included: true
  prerequisites_assumed:
    - basic general topology
goal:
  success_criteria: The answer should separate a point x notin K from each y in K
    by disjoint open neighborhoods, extract a finite subcover of K from the
    neighborhoods around y, and intersect the corresponding neighborhoods of x
    to obtain an open set disjoint from K.
  forbidden_shortcuts:
    - stating the theorem without showing the Hausdorff separation step
