outline_summary: A normal projective curve is nonsingular, hence Y is already
  the normalization of itself. Since X is smooth and f is a birational morphism
  from a smooth projective curve, the universal property of normalization or
  degree considerations force f to coincide with the normalization map, hence to
  be an isomorphism.
required_ingredients:
  - normal curve implies smooth
  - normalization or finite birational morphism argument
common_failure_modes:
  - asserting birational morphisms are always isomorphisms in higher dimension
  - not using normality of Y
