  body: Let f:X -> Y be a birational morphism of projective curves over an
    algebraically closed field. Assume X is smooth and Y is normal. Explain why
    f must be an isomorphism.
  notation_conventions:
    - normal for curves means nonsingular in codimension one, hence regular
