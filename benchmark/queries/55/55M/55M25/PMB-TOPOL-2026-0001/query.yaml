statement:
  title: Degree one self-map of the sphere
  body: Let f:S^n -> S^n be a continuous map of degree 1. Explain why f cannot be
    null-homotopic.
  notation_conventions:
    - degree means the induced map on top homology
  definitions_included: true
  prerequisites_assumed:
    - singular homology
    - homotopy invariance
goal:
  success_criteria: The answer should note that a null-homotopic map induces the
    zero map on reduced homology, whereas a degree-one map induces the identity
    on H_n(S^n), so the map cannot be null-homotopic.
  forbidden_shortcuts:
    - stating 'degree is a homotopy invariant' without tying it to null-homotopy
