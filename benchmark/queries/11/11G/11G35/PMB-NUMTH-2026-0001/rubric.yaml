rubric_id: RUBRIC-PMB-NUMTH-2026-0001
query_id: PMB-NUMTH-2026-0001
owning_area_code: 11Gxx
rubric_basis: proof-rubric-v0
rubric_focus:
  problem_type: theorem_applicability
  answer_format: short_justification
  primary_metric: correctness
  secondary_metrics:
    - theorem_selection
    - use_of_hypotheses
success_criteria: The answer should explain that a smooth projective genus-zero
  curve is a conic after choosing an embedding and that the Hasse-Minkowski
  principle for conics yields a K-rational point.
required_elements:
  - identify the curve as a conic or Severi-Brauer variety of dimension one
  - apply Hasse principle for conics
alternate_valid_approaches: []
fatal_errors:
  - stating the Hasse principle without connecting genus zero to conics
  - forgets projective smooth genus-zero curves need not have a K-point a priori
  - quotes Riemann-Roch without addressing local data
partial_credit_guidance:
  - Credit mathematically meaningful progress that establishes a valid proof
    skeleton or isolates the correct obstruction.
  - Do not grant high credit for citation-only responses or vague references to
    standard methods.
