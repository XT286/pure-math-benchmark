statement:
  title: Local points on a genus-zero curve over a number field
  body: Let C be a smooth projective curve of genus 0 over a number field K.
    Assume C has a K_v-rational point for every completion K_v of K. Explain why
    one may conclude that C(K) is nonempty.
  notation_conventions:
    - K_v denotes a completion of K at a place v
  definitions_included: true
  prerequisites_assumed:
    - basic facts about genus-zero curves
    - Hasse principle for conics
goal:
  success_criteria: The answer should explain that a smooth projective genus-zero
    curve is a conic after choosing an embedding and that the Hasse-Minkowski
    principle for conics yields a K-rational point.
  forbidden_shortcuts:
    - stating the Hasse principle without connecting genus zero to conics
