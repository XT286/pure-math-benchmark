statement:
  title: Finite-dimensional irreducible representations of a semisimple Lie algebra
  body: Let g be a complex semisimple Lie algebra. Explain why every
    finite-dimensional irreducible representation of g contains a highest weight
    vector with respect to a chosen triangular decomposition.
  notation_conventions:
    - highest weight is with respect to a fixed Cartan and positive root system
  definitions_included: true
  prerequisites_assumed:
    - triangular decomposition
    - weight decomposition of finite-dimensional modules
goal:
  success_criteria: The answer should use finite-dimensional weight decomposition
    and choose a maximal weight relative to the positive roots, then explain why
    all positive root operators kill a vector in that weight space.
  forbidden_shortcuts:
    - stating the highest weight theorem without the maximal-weight mechanism
