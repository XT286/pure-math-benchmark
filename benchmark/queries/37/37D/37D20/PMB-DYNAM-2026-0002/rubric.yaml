success_criteria: The answer should explain that if two distinct points stayed
  uniformly close under all forward and backward iterates, hyperbolic splitting
  would force their displacement to lie simultaneously in stable and unstable
  directions, hence to vanish. Compactness and uniformity produce a common
  expansivity constant.
required_elements:
  - The answer should explain that if two distinct points stayed uniformly close
    under all forward and backward iterates, hyperbolic splitting would force
    their displacement to lie simultaneously in stable and unstable directions,
    hence to vanish. Compactness and uniformity produce a common expansivity
    constant.
alternate_valid_approaches: []
fatal_errors:
  - stating 'hyperbolic implies expansive' without the stable/unstable
    explanation
  - uses only forward contraction or only backward expansion
  - does not explain the role of stable and unstable directions together
partial_credit_guidance:
