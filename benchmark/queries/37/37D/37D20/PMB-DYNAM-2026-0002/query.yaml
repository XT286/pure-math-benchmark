statement:
  title: Why Anosov diffeomorphisms are expansive
  body: Let f be an Anosov diffeomorphism of a compact manifold. Explain why f is
    expansive. A complete proof is not required, but the answer should identify
    the stable/unstable mechanism that forces orbit separation.
  notation_conventions:
    - expansive means there exists c>0 such that if d(f^n x,f^n y)<c for all n
      in Z, then x=y
  definitions_included: true
  prerequisites_assumed:
    - stable and unstable manifolds
    - uniform hyperbolicity
goal:
  success_criteria: The answer should explain that if two distinct points stayed
    uniformly close under all forward and backward iterates, hyperbolic
    splitting would force their displacement to lie simultaneously in stable and
    unstable directions, hence to vanish. Compactness and uniformity produce a
    common expansivity constant.
  forbidden_shortcuts:
    - stating 'hyperbolic implies expansive' without the stable/unstable
      explanation
