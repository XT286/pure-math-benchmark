statement:
  title: Minimality versus mixing for irrational circle rotations
  body: Consider the rotation T_alpha(x)=x+alpha mod 1 on the circle, where alpha
    is irrational. Explain why T_alpha is minimal but not mixing. The answer
    should distinguish clearly between the two dynamical notions rather than
    only naming them.
  notation_conventions:
    - minimal means every orbit is dense
    - mixing means measure-theoretic mixing with respect to Lebesgue measure
  definitions_included: true
  prerequisites_assumed:
    - basic topological and measurable dynamics
    - irrational rotations on the circle
goal:
  success_criteria: The answer should explain that irrational rotations have dense
    orbits, giving minimality, and that they have pure point spectrum / rigid
    correlation behavior preventing mixing.
  forbidden_shortcuts:
    - asserting 'rotations are isometries so not mixing' without mathematical
      explanation
