statement:
  title: Why finite fields of the same cardinality are isomorphic
  body: Let F and F' be finite fields with q elements. Explain why F and F' must
    be isomorphic, and make clear whether the argument is best viewed through
    splitting fields, cyclic multiplicative groups, or both.
  notation_conventions:
    - q denotes a prime power
  definitions_included: true
  prerequisites_assumed:
    - basic finite field theory
    - splitting fields
goal:
  success_criteria: The answer should explain that both fields are splitting
    fields of x^q-x over the prime field, equivalently the unique field with q
    elements up to isomorphism, and may note the multiplicative group structure
    as supporting context.
  forbidden_shortcuts:
    - asserting uniqueness without any structural reason
