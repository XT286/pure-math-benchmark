statement:
  title: Higher Ext over a hereditary finite-dimensional algebra
  body: Let A be a finite-dimensional hereditary algebra over a field. Explain why
    Ext_A^2(X,Y)=0 for all finite-dimensional A-modules X and Y.
  notation_conventions:
    - Ext_A^i denotes Yoneda Ext in the module category
  definitions_included: true
  prerequisites_assumed:
    - global dimension
    - hereditary algebras
goal:
  success_criteria: The answer should state that hereditary means global dimension
    at most 1, so all modules admit projective resolutions of length at most 1,
    forcing Ext^2 to vanish.
  forbidden_shortcuts:
    - treating hereditary as semisimple
