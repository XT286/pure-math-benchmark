rubric_id: RUB-CAND-0022
query_id: PMB-CAND-2026-0022
owning_area_code: 37Axx
rubric_basis: Reference-grounded candidate rubric derived from Walters, Ergodic Theory.
rubric_focus:
  problem_type: theorem_applicability
  answer_format: proof_outline
  primary_metric: mathematical correctness
  secondary_metrics:
    - correct theorem selection
    - hypothesis handling
    - clarity of proof architecture
success_criteria: >
  The answer should identify the statement as Poincare recurrence and explain
  that infinitely many disjoint forward images of a positive-measure wandering
  subset would contradict finiteness of the measure.
required_elements:
  - identify the contradiction with finite total measure
  - state that the exceptional set has measure zero
alternate_valid_approaches: []
fatal_errors:
  - claiming every point returns, rather than almost every point
  - forgetting measure preservation
partial_credit_guidance:
  - award partial credit when the governing theorem is identified correctly but
    one justification step is incomplete
  - award partial credit for a structurally correct proof outline that leaves
    only routine verification gaps
