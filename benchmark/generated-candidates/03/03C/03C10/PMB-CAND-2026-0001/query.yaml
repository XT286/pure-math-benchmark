statement:
  title: Quantifier elimination forces model completeness
  body: >
    Let T be a complete first-order theory with quantifier elimination in a
    language L. Explain why every embedding between models of T is elementary,
    and conclude that T is model complete.
  notation_conventions:
    - embedding means an injective homomorphism of L-structures
  definitions_included: true
  prerequisites_assumed:
    - quantifier elimination
    - elementary embeddings
    - model completeness
goal:
  success_criteria: >
    The answer should reduce arbitrary formulas to quantifier-free formulas,
    note that embeddings preserve and reflect quantifier-free truth, and then
    conclude that every embedding between models of T is elementary.
  forbidden_shortcuts:
    - citation-only answer without explaining why the cited fact applies
    - asserting the conclusion without identifying the governing theorem or
      construction
