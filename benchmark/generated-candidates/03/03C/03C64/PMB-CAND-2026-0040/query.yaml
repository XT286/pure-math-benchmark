statement:
  title: Monotonicity on a definable interval in an o-minimal structure
  body: >
    Let M be an o-minimal expansion of a real closed field and let f: (a, b) ->
    M be definable. A collaborator wants to analyze f by cutting the interval
    into finitely many pieces on which f has controlled behavior. Explain why
    o-minimality guarantees a finite partition of (a, b) into subintervals on
    each of which f is continuous and either constant or strictly monotone.
  notation_conventions: []
  definitions_included: true
  prerequisites_assumed:
    - o-minimality
    - definable sets in one variable
    - cell decomposition or monotonicity theorem
goal:
  success_criteria: >
    The answer should identify the o-minimal monotonicity theorem and explain
    why one-variable definability forces only finitely many intervals of
    discontinuity or changes of monotonic behavior.
