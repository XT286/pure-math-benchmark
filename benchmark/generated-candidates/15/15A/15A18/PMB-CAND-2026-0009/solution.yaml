outline_summary: >
  Suppose sum c_i v_i = 0 with distinct eigenvalues lambda_i and not all c_i
  zero. Apply T and subtract lambda_1 times the original relation to get a
  shorter dependence sum_{i>1} c_i (lambda_i - lambda_1) v_i = 0. By minimality
  all coefficients vanish, forcing all c_i = 0. Hence the eigenvectors are
  linearly independent.
