outline_summary: >
  If |lambda| > ||T||, then ||T / lambda|| < 1. Hence I - T / lambda is
  invertible by the Neumann series sum_{n>=0} (T / lambda)^n, so lambda I - T is
  invertible. Therefore such lambda cannot belong to the spectrum, which shows
  sigma(T) lies in the closed disk of radius ||T||.
required_ingredients:
  - Neumann series
common_failure_modes:
  - asserting the spectral radius formula when only the upper bound was requested
