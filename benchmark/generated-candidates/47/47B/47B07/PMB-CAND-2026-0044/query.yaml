statement:
  title: Compact operators are not invertible on infinite-dimensional Banach spaces
  body: >
    Let X be an infinite-dimensional Banach space and T: X -> X a compact
    operator. Explain why T cannot be boundedly invertible.
  notation_conventions: []
  definitions_included: true
  prerequisites_assumed:
    - Banach spaces
    - compact operators
    - Riesz lemma or compactness of the unit ball image
goal:
  success_criteria: >
    The answer should show that bounded invertibility would force the image of
    the unit ball to contain a scaled copy of the unit ball, contradicting the
    compactness properties of bounded sets in infinite-dimensional Banach
    spaces.
