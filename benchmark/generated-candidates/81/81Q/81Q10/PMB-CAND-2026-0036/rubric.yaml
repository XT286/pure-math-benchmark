rubric_id: RUB-CAND-0036
query_id: PMB-CAND-2026-0036
owning_area_code: 81Qxx
rubric_basis: Reference-grounded candidate rubric derived from Reed-Simon,
  Methods of Modern Mathematical Physics I.
rubric_focus:
  problem_type: theorem_applicability
  answer_format: proof_outline
  primary_metric: mathematical correctness
  secondary_metrics:
    - correct theorem selection
    - hypothesis handling
    - clarity of proof architecture
success_criteria: >
  The answer should show that A - lambda I is bounded below when Im(lambda) !=
  0, hence invertible, so nonreal lambda lie in the resolvent.
required_elements:
  - use selfadjointness in the inner-product computation
  - explain why nonreal lambda implies invertibility
alternate_valid_approaches: []
fatal_errors:
  - appealing to finite-dimensional diagonalization only
partial_credit_guidance:
  - award partial credit when the governing theorem is identified correctly but
    one justification step is incomplete
  - award partial credit for a structurally correct proof outline that leaves
    only routine verification gaps
