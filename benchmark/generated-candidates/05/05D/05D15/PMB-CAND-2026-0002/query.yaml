statement:
  title: Hall condition as a certificate for a saturating matching
  body: >
    Let G = (X sqcup Y, E) be a finite bipartite graph. Assume that every subset
    S of X satisfies |N(S)| >= |S|. Explain why G contains a matching that
    saturates X.
  notation_conventions:
    - N(S) denotes the neighborhood of S in Y
  definitions_included: true
