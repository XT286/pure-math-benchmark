statement:
  title: Prime avoidance as a hypothesis-checking tool
  body: >
    Let R be a commutative ring and let I be an ideal contained in the union of
    finitely many prime ideals p_1, ..., p_n. Explain why prime avoidance
    implies that I is contained in one of the p_i, and indicate why the
    finiteness hypothesis matters in research use.
  notation_conventions: []
  definitions_included: true
  prerequisites_assumed:
    - ideals in commutative rings
    - prime ideals
    - prime avoidance lemma
goal:
  success_criteria: >
    The answer should state the prime avoidance conclusion in the finite case,
    explain the containment result, and note that the statement can fail for
    infinite unions or without the correct structural hypotheses.
  forbidden_shortcuts:
