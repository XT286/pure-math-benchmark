rubric_id: RUB-CAND-0025
query_id: PMB-CAND-2026-0025
owning_area_code: 46Axx
rubric_basis: Reference-grounded candidate rubric derived from Conway, Functional Analysis.
rubric_focus:
  problem_type: theorem_applicability
  answer_format: proof_outline
  primary_metric: mathematical correctness
  secondary_metrics:
    - correct theorem selection
    - hypothesis handling
    - clarity of proof architecture
success_criteria: >
  The answer should identify the norm as a sublinear dominating function and
  invoke Hahn-Banach to obtain an extension preserving the bound.
required_elements:
  - define the dominating sublinear functional p(x) = ||phi|| ||x||
  - show phi(y) <= p(y) on Y
  - invoke Hahn-Banach
alternate_valid_approaches: []
fatal_errors:
  - claiming uniqueness of the extension
  - omitting boundedness control
partial_credit_guidance:
  - award partial credit when the governing theorem is identified correctly but
    one justification step is incomplete
  - award partial credit for a structurally correct proof outline that leaves
    only routine verification gaps
