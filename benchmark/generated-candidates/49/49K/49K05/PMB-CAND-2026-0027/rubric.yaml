rubric_id: RUB-CAND-0027
query_id: PMB-CAND-2026-0027
owning_area_code: 49Kxx
rubric_basis: Reference-grounded candidate rubric derived from Liberzon,
  Calculus of Variations and Optimal Control.
rubric_focus:
  problem_type: proof_strategy
  answer_format: proof_outline
  primary_metric: mathematical correctness
  secondary_metrics:
    - correct theorem selection
    - hypothesis handling
    - clarity of proof architecture
success_criteria: >
  The answer should compute the first variation against compactly supported
  endpoint-preserving perturbations, integrate by parts, and apply the
  fundamental lemma of the calculus of variations.
required_elements:
  - introduce endpoint-preserving variations
  - compute the first variation
  - apply the fundamental lemma
alternate_valid_approaches: []
fatal_errors:
  - omitting the boundary terms from integration by parts
  - assuming the Euler-Lagrange equation without deriving it
partial_credit_guidance:
  - award partial credit when the governing theorem is identified correctly but
    one justification step is incomplete
  - award partial credit for a structurally correct proof outline that leaves
    only routine verification gaps
