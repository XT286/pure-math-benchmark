statement:
  title: Inclusion-reversing Galois correspondence
  body: >
    Let L / K be a finite Galois extension with G = Gal(L / K). Explain why the
    assignments H -> L^H and E -> Gal(L / E) define an inclusion-reversing
    bijection between subgroups of G and intermediate fields E with K subseteq E
    subseteq L.
  notation_conventions: []
  definitions_included: true
  prerequisites_assumed:
    - finite Galois extensions
    - fixed fields
    - Galois groups
