rubric_id: RUB-CAND-0033
query_id: PMB-CAND-2026-0033
owning_area_code: 62Bxx
rubric_basis: Reference-grounded candidate rubric derived from Casella-Berger,
  Statistical Inference.
rubric_focus:
  problem_type: theorem_applicability
  answer_format: proof_outline
  primary_metric: mathematical correctness
  secondary_metrics:
    - correct theorem selection
    - hypothesis handling
    - clarity of proof architecture
success_criteria: >
  The answer should connect the stated factorization to the fact that the
  conditional distribution of X given T(X) no longer depends on theta.
required_elements:
  - identify the factorization theorem
  - explain the parameter-free conditional law given T
alternate_valid_approaches: []
fatal_errors:
  - claiming factorization with h depending on theta
partial_credit_guidance:
  - award partial credit when the governing theorem is identified correctly but
    one justification step is incomplete
  - award partial credit for a structurally correct proof outline that leaves
    only routine verification gaps
