outline_summary: >
  The Fisher-Neyman factorization theorem states that if the joint density can
  be written as g_theta(T(x)) h(x), then all theta-dependence is funneled
  through T. Consequently the conditional distribution of X given T(X) = t is
  determined by h and the fiber T^{-1}(t), not by theta, so T is sufficient.
