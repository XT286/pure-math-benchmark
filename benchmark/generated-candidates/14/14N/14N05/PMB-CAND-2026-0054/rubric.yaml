rubric_id: RUB-CAND-0054
query_id: PMB-CAND-2026-0054
owning_area_code: 14Nxx
rubric_basis: Reference-grounded candidate rubric derived from Harris, A First Course.
rubric_focus:
  problem_type: theorem_applicability
  answer_format: proof_outline
  primary_metric: mathematical correctness
  secondary_metrics:
    - correct theorem selection
    - hypothesis handling
    - clarity of proof architecture
success_criteria: >
  The answer should identify the Bertini smoothness theorem, state the role of
  base-point-freeness and characteristic assumptions, and explain why one uses
  the theorem to reduce geometric questions to general hyperplane-type sections.
required_elements:
  - identify Bertini smoothness
  - explain the role of base-point-freeness
  - connect the theorem to research-style reduction arguments
alternate_valid_approaches: []
fatal_errors:
  - claiming every divisor in the system is smooth
  - ignoring characteristic issues or base points
partial_credit_guidance:
  - award partial credit when the governing theorem is identified correctly but
    one justification step is incomplete
  - award partial credit for a structurally correct proof outline that leaves
    only routine verification gaps
