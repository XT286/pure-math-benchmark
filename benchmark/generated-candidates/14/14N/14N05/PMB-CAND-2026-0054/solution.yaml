outline_summary: >
  Bertini's theorem says that on a smooth projective variety over an
  algebraically closed field of characteristic zero, a general member of a
  base-point-free linear system is smooth. The base-point-free hypothesis
  ensures there is no forced singularity at a fixed base locus, and the theorem
  underwrites many research arguments that pass to general sections to simplify
  dimension or positivity questions.
required_ingredients:
  - Bertini smoothness theorem
common_failure_modes:
  - substituting an arbitrary special divisor for a general member
