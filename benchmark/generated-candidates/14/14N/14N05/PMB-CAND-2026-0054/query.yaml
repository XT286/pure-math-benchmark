  title: Bertini smoothness away from the base locus
  body: >
    Let X be a smooth projective variety over an algebraically closed field of
    characteristic zero, and let |V| be a base-point-free linear system on X.
    Explain why a general divisor in |V| is smooth, and indicate why this is a
    standard research-use step rather than a formal afterthought.
