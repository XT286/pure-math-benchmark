  title: Jacobian criterion at a hypersurface point
  body: >
    Let X subseteq A^n_k be the hypersurface defined by f = 0 over an
    algebraically closed field k, and let p in X. Explain why a nonzero gradient
    of f at p implies that p is a smooth point of X.
