outline_summary: >
  For a hypersurface, the Jacobian matrix is the row of partial derivatives of
  f. If at least one partial derivative is nonzero at p, then the rank of the
  Jacobian at p is one, so the Zariski tangent space has the expected
  codimension one. By the Jacobian criterion, p is therefore a smooth point of
  X.
