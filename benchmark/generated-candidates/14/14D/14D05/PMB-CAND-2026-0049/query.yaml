statement:
  title: Genus constancy in a smooth proper family of curves
  body: >
    Let f: X -> S be a smooth proper morphism whose fibers are connected curves.
    Explain why the genus of the fibers is locally constant on S, and why this
    is the kind of fact one checks before treating the family as a moduli
    object.
