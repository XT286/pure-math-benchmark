outline_summary: >
  A nonzero rational function f defines a morphism C -> P^1 away from
  indeterminacy, and projectivity extends the relevant divisor computation. The
  pullback of the divisor [0] - [infinity] on P^1 is exactly div(f). Since [0]
  and [infinity] each have degree one, their pullbacks have equal degree, so deg
  div(f) = 0.
