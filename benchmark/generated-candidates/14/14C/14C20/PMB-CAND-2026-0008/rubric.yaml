rubric_id: RUB-CAND-0008
query_id: PMB-CAND-2026-0008
owning_area_code: 14Cxx
rubric_basis: Reference-grounded candidate rubric derived from Hartshorne,
  Algebraic Geometry.
rubric_focus:
  problem_type: proof_strategy
  answer_format: proof_outline
  primary_metric: mathematical correctness
  secondary_metrics:
    - correct theorem selection
    - hypothesis handling
    - clarity of proof architecture
success_criteria: >
  The answer should interpret div(f) as the difference between the zero and pole
  divisors of f, then explain using the induced morphism C -> P^1 or an
  equivalent valuation argument why total zeros and poles occur with equal
  multiplicity.
required_elements:
  - define degree as the sum of coefficients
  - connect zeros and poles to a map to P^1 or a valuation identity
  - conclude equality of total multiplicities
alternate_valid_approaches: []
fatal_errors:
  - arguing only for affine curves
  - forgetting multiplicities of zeros and poles
partial_credit_guidance:
  - award partial credit when the governing theorem is identified correctly but
    one justification step is incomplete
  - award partial credit for a structurally correct proof outline that leaves
    only routine verification gaps
