statement:
  title: What a point of the Hilbert scheme actually parametrizes
  body: >
    Let P be a fixed Hilbert polynomial. Explain why a closed point of the
    Hilbert scheme Hilb^P(P^n) should be interpreted as a closed subscheme of
    P^n with Hilbert polynomial P, rather than merely as a subset of points.
  notation_conventions: []
  definitions_included: true
