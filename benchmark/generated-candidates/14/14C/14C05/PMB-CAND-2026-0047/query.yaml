    - projective schemes
    - Hilbert polynomial
    - Hilbert scheme
goal:
  success_criteria: >
    The answer should identify the functor represented by the Hilbert scheme and
    explain that the represented objects are families of closed subschemes, so a
    closed point corresponds to a single closed subscheme with the given Hilbert
    polynomial.
