statement:
  title: Weak duality for linear programming
  body: >
    Consider the primal maximization problem max c^T x subject to A x <= b and x
    >= 0, and the corresponding dual minimization problem min b^T y subject to
    A^T y >= c and y >= 0. Explain why every primal feasible x and dual feasible
    y satisfy c^T x <= b^T y.
  notation_conventions: []
  definitions_included: true
  prerequisites_assumed:
    - linear programming
    - matrix inequalities
goal:
  success_criteria: >
    The answer should chain the inequalities c^T x <= y^T A x <= y^T b,
    explaining each step from feasibility and nonnegativity.
