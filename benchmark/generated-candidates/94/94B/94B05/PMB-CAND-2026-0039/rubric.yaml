rubric_id: RUB-CAND-0039
query_id: PMB-CAND-2026-0039
owning_area_code: 94Bxx
rubric_basis: Reference-grounded candidate rubric derived from Huffman-Pless,
  Fundamentals of Error-Correcting Codes.
rubric_focus:
  problem_type: proof_strategy
  answer_format: proof_outline
  primary_metric: mathematical correctness
  secondary_metrics:
    - correct theorem selection
    - hypothesis handling
    - clarity of proof architecture
success_criteria: >
  The answer should interpret C^perp as the orthogonal complement of C in F_q^n
  with respect to the standard bilinear form and use the general dimension
  formula for a subspace plus its orthogonal complement.
required_elements:
  - define the dual code as an orthogonal complement
  - invoke the vector-space dimension formula
alternate_valid_approaches: []
fatal_errors:
  - confusing the coding-theoretic dual with the abstract dual space
partial_credit_guidance:
  - award partial credit when the governing theorem is identified correctly but
    one justification step is incomplete
  - award partial credit for a structurally correct proof outline that leaves
    only routine verification gaps
