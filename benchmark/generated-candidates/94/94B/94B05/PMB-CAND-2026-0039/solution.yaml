outline_summary: >
  The ambient space F_q^n carries the standard nondegenerate bilinear form x dot
  y = sum x_i y_i. The dual code C^perp is exactly the orthogonal complement of
  C for this form. In a finite-dimensional space with a nondegenerate bilinear
  form, any subspace satisfies dim(C) + dim(C^perp) = dim(F_q^n) = n.
required_ingredients:
  - orthogonal-complement dimension formula
