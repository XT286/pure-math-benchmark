outline_summary: >
  For x outside K and each y in K, choose disjoint open sets U_y containing y
  and V_y containing x. The U_y cover K, so compactness gives finitely many. The
  intersection of the corresponding finitely many V_y is an open neighborhood of
  x disjoint from K. Thus every point outside K has an open neighborhood
  disjoint from K, so X \\ K is open and K is closed.
required_ingredients:
