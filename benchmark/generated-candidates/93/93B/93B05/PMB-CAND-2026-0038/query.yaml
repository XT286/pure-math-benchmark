statement:
  title: Kalman rank condition for controllability
  body: >
    Consider the linear control system x' = A x + B u on R^n. Explain why full
    rank of the controllability matrix [B AB ... A^{n-1}B] implies
    controllability on a finite time interval.
  notation_conventions: []
  definitions_included: true
  prerequisites_assumed:
    - linear systems
    - controllability
    - matrix exponential
goal:
  success_criteria: >
    The answer should identify the reachable subspace as the span of the columns
    of B, AB, ..., A^{n-1}B and conclude that full rank means the whole state
    space is reachable.
