rubric_id: RUB-CAND-0031
query_id: PMB-CAND-2026-0031
owning_area_code: 55Nxx
rubric_basis: Reference-grounded candidate rubric derived from Hatcher, Algebraic Topology.
rubric_focus:
  problem_type: proof_strategy
  answer_format: proof_outline
  primary_metric: mathematical correctness
  secondary_metrics:
    - correct theorem selection
    - hypothesis handling
    - clarity of proof architecture
success_criteria: >
  The answer should use the relation f_sharp - g_sharp = partial H + H partial
  to show that f_sharp and g_sharp differ by a boundary on cycles, hence define
  the same homology class.
required_elements:
  - write the chain-homotopy identity
  - evaluate it on cycles
  - conclude equality on homology classes
alternate_valid_approaches: []
fatal_errors:
  - confusing homotopy of maps with chain homotopy of chain maps without
    explanation
partial_credit_guidance:
  - award partial credit when the governing theorem is identified correctly but
    one justification step is incomplete
  - award partial credit for a structurally correct proof outline that leaves
    only routine verification gaps
