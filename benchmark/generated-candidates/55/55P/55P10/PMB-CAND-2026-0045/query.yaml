  title: Whitehead theorem as a research-use equivalence test
  body: >
    Let f: X -> Y be a map between connected CW complexes that induces
    isomorphisms on all homotopy groups. Explain why Whitehead's theorem allows
    one to conclude that f is a homotopy equivalence.
