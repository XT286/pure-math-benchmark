rubric_id: RUB-CAND-0020
query_id: PMB-CAND-2026-0020
owning_area_code: 34Axx
rubric_basis: Reference-grounded candidate rubric derived from Teschl, Ordinary
  Differential Equations.
rubric_focus:
  problem_type: theorem_applicability
  answer_format: proof_outline
  primary_metric: mathematical correctness
  secondary_metrics:
    - correct theorem selection
    - hypothesis handling
    - clarity of proof architecture
success_criteria: >
  The answer should identify the local Lipschitz hypothesis as the standard
  uniqueness condition in Picard-Lindelof and conclude local uniqueness.
required_elements:
  - mention continuity in t and local Lipschitz in x
  - identify the relevant existence-uniqueness theorem
alternate_valid_approaches: []
fatal_errors:
  - claiming uniqueness from continuity alone
partial_credit_guidance:
  - award partial credit when the governing theorem is identified correctly but
    one justification step is incomplete
  - award partial credit for a structurally correct proof outline that leaves
    only routine verification gaps
