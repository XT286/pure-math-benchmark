statement:
  title: Local uniqueness from a Lipschitz condition
  body: >
    Consider the initial value problem x'(t) = F(t, x(t)), x(t_0) = x_0. Assume
    F is continuous in t and locally Lipschitz in x near (t_0, x_0). Explain why
    the problem has at most one local solution through (t_0, x_0).
  notation_conventions: []
