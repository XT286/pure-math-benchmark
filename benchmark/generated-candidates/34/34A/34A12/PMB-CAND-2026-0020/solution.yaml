outline_summary: >
  Picard-Lindelof states that continuity in t together with local Lipschitz
  control in x yields a unique local solution to the initial value problem. The
  hypotheses match that theorem exactly, so two distinct local solutions through
  (t_0, x_0) cannot exist.
required_ingredients:
  - Picard-Lindelof uniqueness theorem
common_failure_modes:
  - invoking Peano's theorem, which gives existence but not uniqueness
