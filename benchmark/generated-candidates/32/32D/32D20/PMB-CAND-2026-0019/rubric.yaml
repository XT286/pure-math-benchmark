rubric_id: RUB-CAND-0019
query_id: PMB-CAND-2026-0019
owning_area_code: 32Dxx
rubric_basis: Reference-grounded candidate rubric derived from Krantz, Several
  Complex Variables.
rubric_focus:
  problem_type: theorem_applicability
  answer_format: proof_outline
  primary_metric: mathematical correctness
  secondary_metrics:
    - correct theorem selection
    - hypothesis handling
    - clarity of proof architecture
success_criteria: >
  The answer should identify this as a Hartogs removable singularity phenomenon
  specific to dimension at least 2 and conclude existence of a holomorphic
  extension to the whole ball.
required_elements:
  - mention that n >= 2 is essential
  - identify Hartogs extension or an equivalent theorem
alternate_valid_approaches: []
fatal_errors:
  - applying one-variable isolated singularity trichotomy directly
  - omitting the role of dimension
partial_credit_guidance:
  - award partial credit when the governing theorem is identified correctly but
    one justification step is incomplete
  - award partial credit for a structurally correct proof outline that leaves
    only routine verification gaps
