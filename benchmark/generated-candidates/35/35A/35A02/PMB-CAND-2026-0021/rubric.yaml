rubric_id: RUB-CAND-0021
query_id: PMB-CAND-2026-0021
owning_area_code: 35Axx
rubric_basis: Reference-grounded candidate rubric derived from Evans, Partial
  Differential Equations.
rubric_focus:
  problem_type: proof_strategy
  answer_format: proof_outline
  primary_metric: mathematical correctness
  secondary_metrics:
    - correct theorem selection
    - hypothesis handling
    - clarity of proof architecture
success_criteria: >
  The answer should use the standard energy identity for the L^2 norm of u and
  the zero data to conclude uniqueness.
required_elements:
  - differentiate the L^2 norm in time
  - integrate by parts using the boundary condition
  - conclude the norm stays zero
alternate_valid_approaches: []
fatal_errors:
  - arguing by elliptic maximum principle only
  - ignoring the boundary term in integration by parts
partial_credit_guidance:
  - award partial credit when the governing theorem is identified correctly but
    one justification step is incomplete
  - award partial credit for a structurally correct proof outline that leaves
    only routine verification gaps
