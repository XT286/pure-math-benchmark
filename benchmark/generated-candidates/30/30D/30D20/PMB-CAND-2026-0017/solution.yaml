outline_summary: >
  Fix z_0 and apply the Cauchy estimate to f on a circle of radius R centered at
  z_0: |f'(z_0)| <= M / R. Since R is arbitrary, letting R -> infinity gives
  f'(z_0) = 0. Hence f' is identically zero and f is constant.
