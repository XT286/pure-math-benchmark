statement:
  title: A pseudofunctor gives rise to a fibered category
  body: >
    Let F: C^op -> Cat be a pseudofunctor. Explain how the Grothendieck
    construction produces a category fibred over C, and identify the role of the
    coherence data in making pullback along morphisms behave correctly.
