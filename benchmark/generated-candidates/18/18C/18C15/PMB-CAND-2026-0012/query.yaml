statement:
  title: Every adjunction yields a monad
  body: >
    Let F: C -> D be left adjoint to U: D -> C with unit eta and counit epsilon.
    Explain how to construct the monad on C associated to this adjunction, and
    state the formulas for its unit and multiplication.
  notation_conventions: []
  definitions_included: true
  prerequisites_assumed:
    - adjoint functors
    - unit and counit of an adjunction
    - monads
goal:
  success_criteria: >
    The answer should identify the endofunctor UF, take eta as the unit, and
    define multiplication by U epsilon F, with a brief indication that the monad
    axioms follow from the triangle identities.
