rubric_id: RUB-CAND-0024
query_id: PMB-CAND-2026-0024
owning_area_code: 42Bxx
rubric_basis: Reference-grounded candidate rubric derived from Grafakos,
  Classical Fourier Analysis.
rubric_focus:
  problem_type: theorem_applicability
  answer_format: proof_outline
  primary_metric: mathematical correctness
  secondary_metrics:
    - correct theorem selection
    - hypothesis handling
    - clarity of proof architecture
success_criteria: >
  The answer should integrate by parts, use rapid decay to kill boundary terms,
  and identify multiplication by the frequency variable.
required_elements:
  - integrate by parts
  - justify vanishing boundary terms
  - identify the frequency multiplier
alternate_valid_approaches: []
fatal_errors:
  - missing the sign or frequency factor from the chosen convention
  - applying the identity without decay assumptions
partial_credit_guidance:
  - award partial credit when the governing theorem is identified correctly but
    one justification step is incomplete
  - award partial credit for a structurally correct proof outline that leaves
    only routine verification gaps
