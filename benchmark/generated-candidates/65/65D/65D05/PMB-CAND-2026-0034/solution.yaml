outline_summary: >
  If p and q are two interpolating polynomials of degree at most n, then r = p -
  q has degree at most n and vanishes at each x_i. Since the nodes are distinct,
  r has n + 1 roots. The only polynomial of degree at most n with that many
  roots is the zero polynomial, so p = q.
required_ingredients:
  - root bound for nonzero polynomials
common_failure_modes:
