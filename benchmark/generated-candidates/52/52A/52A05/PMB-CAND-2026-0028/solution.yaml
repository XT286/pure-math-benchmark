outline_summary: >
  Because K is compact and C is closed and disjoint from K, the distance between
  them is positive and is attained by some x_0 in K and y_0 in C. The linear
  functional determined by y_0 - x_0 strictly separates the two sets: the
  midpoint hyperplane orthogonal to y_0 - x_0 places K on one side and C on the
  other.
required_ingredients:
  - attainment of distance between compact and closed sets
  - geometric separating hyperplane argument
common_failure_modes:
  - forgetting why strict inequality holds on the compact side
