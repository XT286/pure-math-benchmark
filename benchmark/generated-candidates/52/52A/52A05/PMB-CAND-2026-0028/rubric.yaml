rubric_id: RUB-CAND-0028
query_id: PMB-CAND-2026-0028
owning_area_code: 52Axx
rubric_basis: Reference-grounded candidate rubric derived from Rockafellar, Convex Analysis.
rubric_focus:
  problem_type: theorem_applicability
  answer_format: proof_outline
  primary_metric: mathematical correctness
  secondary_metrics:
    - correct theorem selection
    - hypothesis handling
    - clarity of proof architecture
success_criteria: >
  The answer should use positive distance between K and C or cite the
  corresponding strict separation theorem under the compact-plus-closed
  hypotheses.
required_elements:
  - explain why the sets have positive distance
  - produce or invoke a supporting hyperplane from a closest-point argument
alternate_valid_approaches: []
fatal_errors:
  - claiming strict separation for arbitrary disjoint convex sets without extra
    hypotheses
partial_credit_guidance:
  - award partial credit when the governing theorem is identified correctly but
    one justification step is incomplete
  - award partial credit for a structurally correct proof outline that leaves
    only routine verification gaps
