statement:
  title: Separating a compact convex set from a disjoint closed convex set
  body: >
    Let K and C be disjoint nonempty convex subsets of R^n, with K compact and C
    closed. Explain why there exists a nonzero linear functional ell and a real
    number alpha such that ell(x) < alpha <= ell(y) for all x in K and y in C.
  notation_conventions: []
  definitions_included: true
  prerequisites_assumed:
    - convex sets
    - Euclidean norm
    - separating hyperplane theorem
