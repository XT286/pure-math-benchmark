subject_families:
  - id: logic_foundations
    label: Logic and Foundations
    msc_roots: ["03"]
    subfields:
      - id: model_theory
        label: Model Theory
        finer_topics: ["stability_and_independence", "o_minimality"]
      - id: set_theory
        label: Set Theory
        finer_topics: ["forcing_and_independence", "large_cardinals"]
      - id: proof_theory
        label: Proof Theory
        finer_topics: ["ordinal_analysis", "proof_interpretations"]
      - id: computability_logic
        label: Computability and Logic
        finer_topics: ["degrees_and_reducibility", "definability_and_effectivity"]

  - id: combinatorics_discrete
    label: Combinatorics and Discrete Structures
    msc_roots: ["05", "52"]
    subfields:
      - id: extremal_combinatorics
        label: Extremal Combinatorics
        finer_topics: ["forbidden_substructures", "stability_methods"]
      - id: algebraic_combinatorics
        label: Algebraic Combinatorics
        finer_topics: ["symmetric_functions", "representation_enumeration"]
      - id: probabilistic_combinatorics
        label: Probabilistic Combinatorics
        finer_topics: ["random_structures", "concentration_and_thresholds"]
      - id: graph_hypergraph_theory
        label: Graph and Hypergraph Theory
        finer_topics: ["coloring_and_ramsey", "expansion_and_pseudorandomness"]

  - id: structural_algebra
    label: General and Structural Algebra
    msc_roots: ["06", "08", "12", "20"]
    subfields:
      - id: group_theory
        label: Group Theory
        finer_topics: ["finite_group_structure", "geometric_group_theory"]
      - id: field_theory
        label: Field Theory
        finer_topics: ["galois_theory", "valuation_and_extensions"]
      - id: order_lattice_theory
        label: Order and Lattice Theory
        finer_topics: ["distributive_lattices", "closure_and_duality"]
      - id: universal_algebra
        label: Universal Algebra
        finer_topics: ["varieties_and_identities", "clone_and_term_structure"]

  - id: number_theory_arithmetic_geometry
    label: Number Theory and Arithmetic Geometry
    msc_roots: ["11", "14G"]
    subfields:
      - id: algebraic_number_theory
        label: Algebraic Number Theory
        finer_topics: ["class_groups_and_units", "local_global_principles"]
      - id: analytic_number_theory
        label: Analytic Number Theory
        finer_topics: ["l_functions", "sieve_and_distribution"]
      - id: diophantine_geometry
        label: Diophantine Geometry
        finer_topics: ["rational_points", "height_methods"]
      - id: automorphic_arithmetic
        label: Automorphic and Arithmetic Aspects
        finer_topics: ["modular_forms", "galois_representations"]

  - id: commutative_algebra_homological
    label: Commutative Algebra and Homological Methods
    msc_roots: ["13", "18", "19"]
    subfields:
      - id: local_commutative_algebra
        label: Local Commutative Algebra
        finer_topics: ["depth_and_regularity", "integral_closure"]
      - id: homological_algebra
        label: Homological Algebra
        finer_topics: ["derived_functors", "resolutions_and_dimensions"]
      - id: k_theory_homological
        label: K-Theory and Homological Methods
        finer_topics: ["algebraic_k_theory", "excision_and_localization"]
      - id: singularities_closure
        label: Singularities and Closure Operations
        finer_topics: ["tight_closure", "multiplier_and_test_ideals"]

  - id: representation_theory_noncommutative
    label: Representation Theory and Noncommutative Algebra
    msc_roots: ["16", "17", "20C", "22E"]
    subfields:
      - id: finite_dimensional_algebras
        label: Finite-Dimensional Algebras
        finer_topics: ["quivers_and_modules", "tilting_and_derived_equivalence"]
      - id: lie_representation_theory
        label: Lie and Algebraic Representation Theory
        finer_topics: ["highest_weight_theory", "character_and_tensor_structure"]
      - id: associative_noncommutative
        label: Associative and Noncommutative Algebra
        finer_topics: ["center_and_polynomial_identity", "homological_noncommutative"]
      - id: quantum_tensor_categories
        label: Quantum Algebra and Tensor Categories
        finer_topics: ["hopf_and_quantum_groups", "fusion_and_tensor_categories"]

  - id: algebraic_geometry
    label: Algebraic Geometry
    msc_roots: ["14"]
    subfields:
      - id: birational_geometry
        label: Birational Geometry
        finer_topics: ["minimal_model_program", "singularities_of_pairs"]
      - id: moduli_geometry
        label: Moduli Theory
        finer_topics: ["stability_and_moduli", "deformation_and_obstruction"]
      - id: sheaves_cohomology
        label: Sheaves and Cohomology
        finer_topics: ["derived_categories", "grothendieck_duality"]
      - id: schemes_stacks
        label: Schemes and Stacks
        finer_topics: ["descent_and_quotients", "etale_and_flat_geometry"]

  - id: topology
    label: Topology
    msc_roots: ["54", "55", "57"]
    subfields:
      - id: algebraic_topology
        label: Algebraic Topology
        finer_topics: ["spectral_sequences", "homotopy_and_homology_operations"]
      - id: geometric_topology
        label: Geometric Topology
        finer_topics: ["manifold_decomposition", "mapping_class_and_moduli"]
      - id: low_dimensional_topology
        label: Low-Dimensional Topology
        finer_topics: ["knots_and_links", "three_manifold_invariants"]
      - id: general_topology
        label: General Topology
        finer_topics: ["compactness_and_separation", "topological_constructions"]

  - id: differential_symplectic_geometry
    label: Differential and Symplectic Geometry
    msc_roots: ["53", "32", "58"]
    subfields:
      - id: riemannian_geometry
        label: Riemannian Geometry
        finer_topics: ["curvature_and_rigidity", "comparison_geometry"]
      - id: complex_kahler_geometry
        label: Complex and Kahler Geometry
        finer_topics: ["kahler_metrics", "hodge_and_complex_structure"]
      - id: symplectic_contact_geometry
        label: Symplectic and Contact Geometry
        finer_topics: ["hamiltonian_geometry", "holomorphic_curve_methods"]
      - id: global_differential_geometry
        label: Global Differential Geometry
        finer_topics: ["connections_and_bundles", "characteristic_classes"]

  - id: analysis
    label: Real, Complex, and Harmonic Analysis
    msc_roots: ["26", "28", "30", "31", "32", "42", "43"]
    subfields:
      - id: real_harmonic_analysis
        label: Real and Harmonic Analysis
        finer_topics: ["singular_integrals", "fourier_restriction_and_decoupling"]
      - id: complex_analysis
        label: Complex Analysis
        finer_topics: ["one_complex_variable", "several_complex_variables"]
      - id: asymptotic_special_functions
        label: Asymptotic Analysis and Special Functions
        finer_topics: ["oscillatory_integrals", "special_function_structure"]
      - id: measure_potential
        label: Measure and Potential Theory
        finer_topics: ["capacity_and_energy", "boundary_behavior"]

  - id: functional_analysis_operator_theory
    label: Functional Analysis and Operator Theory
    msc_roots: ["46", "47"]
    subfields:
      - id: banach_space_theory
        label: Banach Space Theory
        finer_topics: ["bases_and_structure", "type_cotype_and_local_theory"]
      - id: hilbert_operator_theory
        label: Hilbert and Operator Theory
        finer_topics: ["spectral_theory", "unbounded_operators"]
      - id: operator_algebras
        label: Operator Algebras
        finer_topics: ["cstar_algebras", "von_neumann_algebras"]
      - id: nonlinear_functional_analysis
        label: Nonlinear Functional Analysis
        finer_topics: ["fixed_point_methods", "variational_structure"]

  - id: dynamics_math_physics_interface
    label: Dynamical Systems and Mathematical Physics Interface
    msc_roots: ["37", "70", "81", "82"]
    subfields:
      - id: ergodic_theory
        label: Ergodic Theory
        finer_topics: ["entropy_and_mixing", "rigidity_and_joinings"]
      - id: smooth_dynamics
        label: Smooth Dynamics
        finer_topics: ["hyperbolicity", "bifurcation_and_stability"]
      - id: integrable_hamiltonian
        label: Integrable and Hamiltonian Systems
        finer_topics: ["integrability", "symplectic_dynamics"]
      - id: mathematical_physics_structures
        label: Mathematical Physics Structures
        finer_topics: ["quantum_field_structures", "statistical_mechanics_structures"]
