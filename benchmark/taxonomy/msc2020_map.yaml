mapping_policy:
  description: >
    Public taxonomy labels are benchmark-facing. Official MSC2020 codes are
    stored separately to preserve human readability while retaining mathematical
    traceability.
  rules:
    - Each item must include at least one MSC2020 code.
    - Each item has exactly one primary taxonomy path.
    - Items may carry multiple MSC2020 codes when the mathematics is genuinely cross-field.
    - Secondary tags do not replace the primary taxonomy path.

