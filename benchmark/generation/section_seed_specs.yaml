seeds:
  - msc_code: 03C10
    source_id: marker-model-theory
    title: Quantifier elimination forces model completeness
    difficulty_stage: phd
    reviewer_score: 3.5
    problem_type: theorem_applicability
    answer_format: proof_outline
    statement_body: >
      Let T be a complete first-order theory with quantifier elimination in a
      language L. Explain why every embedding between models of T is elementary,
      and conclude that T is model complete.
    notation_conventions:
      - embedding means an injective homomorphism of L-structures
    prerequisites_assumed:
      - quantifier elimination
      - elementary embeddings
      - model completeness
    success_criteria: >
      The answer should reduce arbitrary formulas to quantifier-free formulas,
      note that embeddings preserve and reflect quantifier-free truth, and then
      conclude that every embedding between models of T is elementary.
    required_elements:
      - explain how quantifier elimination replaces an arbitrary formula by a quantifier-free one
      - state why embeddings preserve quantifier-free formulas
      - connect elementary embeddings to model completeness
    fatal_errors:
      - confusing quantifier elimination with completeness alone
      - claiming every homomorphism is elementary
    outline_summary: >
      If phi is any formula, quantifier elimination gives an equivalent
      quantifier-free formula psi modulo T. Quantifier-free formulas are decided
      purely by the interpretation of function and relation symbols, so
      embeddings preserve and reflect them. Hence an embedding between models of
      T preserves every formula and is elementary; therefore T is model complete.
    required_ingredients:
      - equivalence of formulas under quantifier elimination
      - preservation of quantifier-free formulas by embeddings
    common_failure_modes:
      - omitting the role of completeness or equivalence modulo T
      - asserting model completeness without discussing embeddings
  - msc_code: 05D15
    source_id: lovasz-plummer-matching
    title: Hall condition as a certificate for a saturating matching
    difficulty_stage: advanced_graduate
    reviewer_score: 3.2
    problem_type: theorem_applicability
    answer_format: proof_outline
    statement_body: >
      Let G = (X sqcup Y, E) be a finite bipartite graph. Assume that every
      subset S of X satisfies |N(S)| >= |S|. Explain why G contains a matching
      that saturates X.
    notation_conventions:
      - N(S) denotes the neighborhood of S in Y
    prerequisites_assumed:
      - bipartite graphs
      - matchings
      - Hall marriage theorem
    success_criteria: >
      The answer should identify Hall's condition and conclude, with a short
      justification, that there is a matching covering every vertex of X.
    required_elements:
      - identify the theorem being applied
      - state the role of the condition on all subsets S of X
    fatal_errors:
      - checking the condition only for singleton subsets
      - concluding existence of a perfect matching when |X| need not equal |Y|
    outline_summary: >
      The given inequality is exactly Hall's condition for the left vertex class
      X. Hall's theorem states that this condition is necessary and sufficient
      for a matching saturating X, so the desired matching exists.
    required_ingredients:
      - Hall's theorem
    common_failure_modes:
      - mixing up a matching saturating X with a perfect matching of the whole graph
  - msc_code: 06D05
    source_id: davey-priestley
    title: Finite distributive lattices from join-irreducibles
    difficulty_stage: phd
    reviewer_score: 3.6
    problem_type: proof_strategy
    answer_format: proof_outline
    statement_body: >
      Let L be a finite distributive lattice and J(L) the poset of its
      join-irreducible elements. Explain why L is isomorphic to the lattice of
      order ideals of J(L).
    prerequisites_assumed:
      - finite lattices
      - distributive lattices
      - join-irreducible elements
    success_criteria: >
      The answer should describe the map sending an element of L to the set of
      join-irreducibles below it, show this lands in order ideals, and explain
      why distributivity yields an inverse by taking joins.
    required_elements:
      - define the order-ideal map explicitly
      - explain why every element is the join of join-irreducibles below it
      - indicate why distributivity gives injectivity and surjectivity
    fatal_errors:
      - replacing order ideals by arbitrary subsets
      - omitting finiteness when invoking joins of join-irreducibles
    outline_summary: >
      Send x in L to I_x = {j in J(L) : j <= x}. This is an order ideal. In a
      finite distributive lattice every element is the join of the
      join-irreducibles below it, so x can be recovered from I_x by taking that
      join. Conversely each order ideal I determines an element by joining the
      members of I, and distributivity shows these constructions are inverse
      lattice homomorphisms.
    required_ingredients:
      - Birkhoff representation theorem for finite distributive lattices
    common_failure_modes:
      - confusing join-irreducible and join-prime without justification
  - msc_code: 08A30
    source_id: burris-sankappanavar
    title: Quotients by kernel congruences in universal algebra
    difficulty_stage: phd
    reviewer_score: 3.4
    problem_type: theorem_applicability
    answer_format: proof_outline
    statement_body: >
      Let h: A -> B be a homomorphism of algebras of the same type. Explain why
      the kernel relation ker(h) is a congruence on A and why h factors through
      the quotient A / ker(h).
    prerequisites_assumed:
      - algebraic structures
      - homomorphisms
      - congruences
      - quotients in universal algebra
    success_criteria: >
      The answer should check compatibility of ker(h) with each basic operation,
      define the induced map on the quotient, and explain why the induced map is
      well defined.
    required_elements:
      - define ker(h) as equality of images
      - show operation compatibility
      - explain the quotient factorization
    fatal_errors:
      - treating ker(h) as a subset instead of an equivalence relation
      - failing to prove the induced quotient map is well defined
    outline_summary: >
      The relation a ~ a' iff h(a) = h(a') is an equivalence relation. Because h
      respects each basic operation, applying any operation to equivalent tuples
      gives equivalent outputs, so ker(h) is a congruence. Then [a] maps to h(a)
      on A / ker(h), and well-definedness follows precisely from the definition
      of ker(h).
    required_ingredients:
      - compatibility of homomorphisms with basic operations
    common_failure_modes:
      - proving only equivalence and not congruence compatibility
  - msc_code: 11A07
    source_id: ireland-rosen
    title: Primitive roots modulo a prime
    difficulty_stage: advanced_graduate
    reviewer_score: 3.1
    problem_type: theorem_applicability
    answer_format: short_justification
    statement_body: >
      Let p be prime. Explain why the multiplicative group (Z / pZ)^times is
      cyclic, and hence why a primitive root modulo p exists.
    prerequisites_assumed:
      - finite groups
      - elementary number theory
      - multiplicative groups modulo p
    success_criteria: >
      The answer should invoke the standard structure theorem for finite
      subgroups of a field's multiplicative group, or an equivalent classical
      argument, and conclude the existence of an element of order p - 1.
    required_elements:
      - identify a theorem or argument showing finite subgroups of a field are cyclic
      - connect cyclicity to primitive roots
    fatal_errors:
      - asserting cyclicity for arbitrary unit groups modulo n
      - confusing additive and multiplicative structure
    outline_summary: >
      The nonzero residue classes modulo p form a finite subgroup of the
      multiplicative group of the field F_p. A standard theorem says every
      finite subgroup of a field's multiplicative group is cyclic, so
      (Z / pZ)^times is cyclic of order p - 1. Any generator is a primitive root
      modulo p.
    required_ingredients:
      - cyclicity of finite multiplicative subgroups of fields
    common_failure_modes:
      - using Euler's theorem alone without establishing existence of an element of maximal order
  - msc_code: 12F10
    source_id: dummit-foote
    title: Inclusion-reversing Galois correspondence
    difficulty_stage: phd
    reviewer_score: 3.6
    problem_type: proof_strategy
    answer_format: proof_outline
    statement_body: >
      Let L / K be a finite Galois extension with G = Gal(L / K). Explain why
      the assignments H -> L^H and E -> Gal(L / E) define an inclusion-reversing
      bijection between subgroups of G and intermediate fields E with
      K subseteq E subseteq L.
    prerequisites_assumed:
      - finite Galois extensions
      - fixed fields
      - Galois groups
    success_criteria: >
      The answer should identify the two assignments, state why each lands in
      the right class, and explain why normality and separability ensure the two
      operations are inverse.
    required_elements:
      - define L^H and Gal(L / E)
      - mention inclusion reversal
      - explain why the constructions are inverse in the Galois case
    fatal_errors:
      - stating the correspondence for arbitrary finite extensions
      - forgetting the Galois hypothesis
    outline_summary: >
      For a subgroup H of G, the fixed field L^H is intermediate. For an
      intermediate field E, the subgroup Gal(L / E) consists of automorphisms
      fixing E pointwise. These maps reverse inclusion because larger subgroups
      fix fewer elements and larger fields admit fewer automorphisms fixing them.
      In a finite Galois extension the fundamental theorem of Galois theory says
      these assignments are inverse bijections.
    required_ingredients:
      - fundamental theorem of Galois theory
    common_failure_modes:
      - discussing fixed rings or fixed subsets instead of fixed fields
  - msc_code: 13C10
    source_id: atiyah-macdonald
    title: Projective modules over local rings are free
    difficulty_stage: phd
    reviewer_score: 3.7
    problem_type: proof_strategy
    answer_format: proof_outline
    statement_body: >
      Let R be a local ring and P a finitely generated projective R-module.
      Explain why P is free.
    prerequisites_assumed:
      - local rings
      - projective modules
      - Nakayama lemma
    success_criteria: >
      The answer should reduce P / mP to a vector space over the residue field,
      lift a basis to generators of P, and use projectivity together with
      Nakayama's lemma to show the resulting surjection from a free module splits
      and is an isomorphism.
    required_elements:
      - pass to the residue field
      - choose lifts of a basis of P / mP
      - use Nakayama's lemma
    fatal_errors:
      - claiming every projective module over any ring is free
      - omitting finite generation when invoking Nakayama
    outline_summary: >
      If m is the maximal ideal, then P / mP is a finite-dimensional vector space
      over R / m. Lift a basis to elements of P; Nakayama implies these lifts
      generate P, giving a surjection R^n -> P. Since P is projective the
      surjection splits, so R^n is isomorphic to P direct sum Q. Modding out by m
      and using minimality of n forces Q / mQ = 0, hence Q = 0 by Nakayama, so
      P is free.
    required_ingredients:
      - residue-field reduction
      - Nakayama lemma
    common_failure_modes:
      - failing to justify why the complementary summand vanishes
  - msc_code: 14C20
    source_id: hartshorne
    title: Principal divisors have degree zero on a smooth projective curve
    difficulty_stage: phd
    reviewer_score: 3.8
    problem_type: proof_strategy
    answer_format: proof_outline
    statement_body: >
      Let C be a smooth projective curve over an algebraically closed field and
      f a nonzero rational function on C. Explain why the principal divisor
      div(f) has degree zero.
    prerequisites_assumed:
      - divisors on curves
      - valuations at closed points
      - projective curves
    success_criteria: >
      The answer should interpret div(f) as the difference between the zero and
      pole divisors of f, then explain using the induced morphism C -> P^1 or an
      equivalent valuation argument why total zeros and poles occur with equal
      multiplicity.
    required_elements:
      - define degree as the sum of coefficients
      - connect zeros and poles to a map to P^1 or a valuation identity
      - conclude equality of total multiplicities
    fatal_errors:
      - arguing only for affine curves
      - forgetting multiplicities of zeros and poles
    outline_summary: >
      A nonzero rational function f defines a morphism C -> P^1 away from
      indeterminacy, and projectivity extends the relevant divisor computation.
      The pullback of the divisor [0] - [infinity] on P^1 is exactly div(f).
      Since [0] and [infinity] each have degree one, their pullbacks have equal
      degree, so deg div(f) = 0.
    required_ingredients:
      - principal divisors
      - degree of divisors on curves
    common_failure_modes:
      - concluding only linear equivalence to zero without mentioning degree
  - msc_code: 15A18
    source_id: dummit-foote
    title: Distinct eigenvalues force linear independence
    difficulty_stage: advanced_graduate
    reviewer_score: 2.8
    problem_type: proof
    answer_format: short_justification
    statement_body: >
      Let T be a linear operator on a finite-dimensional vector space V. Explain
      why eigenvectors corresponding to distinct eigenvalues of T are linearly
      independent.
    prerequisites_assumed:
      - eigenvalues and eigenvectors
      - linear independence
    success_criteria: >
      The answer should give the standard induction or annihilating-polynomial
      argument showing that a nontrivial linear dependence contradicts
      distinctness of the eigenvalues.
    required_elements:
      - start from a hypothetical minimal linear dependence
      - apply T and subtract a scalar multiple
    fatal_errors:
      - treating generalized eigenvectors as ordinary eigenvectors
      - arguing only for two eigenvectors
    outline_summary: >
      Suppose sum c_i v_i = 0 with distinct eigenvalues lambda_i and not all
      c_i zero. Apply T and subtract lambda_1 times the original relation to get
      a shorter dependence sum_{i>1} c_i (lambda_i - lambda_1) v_i = 0. By
      minimality all coefficients vanish, forcing all c_i = 0. Hence the
      eigenvectors are linearly independent.
    required_ingredients:
      - minimal dependence argument
    common_failure_modes:
      - writing a determinant argument without explaining the Vandermonde step
  - msc_code: 16D40
    source_id: lam-first-course
    title: Projective modules as direct summands of free modules
    difficulty_stage: phd
    reviewer_score: 3.5
    problem_type: framework_comparison
    answer_format: proof_outline
    statement_body: >
      Let P be a left module over a ring R. Explain why P is projective if and
      only if P is isomorphic to a direct summand of some free R-module.
    prerequisites_assumed:
      - projective modules
      - free modules
      - split exact sequences
    success_criteria: >
      The answer should prove both directions: a splitting of a surjection from a
      free module yields a direct-summand decomposition, and a direct summand of
      a free module has the lifting property.
    required_elements:
      - construct a surjection from a free module onto P
      - use projectivity to split that surjection
      - explain why a direct summand of a free module is projective
    fatal_errors:
      - proving only one implication
      - confusing injective and projective lifting properties
    outline_summary: >
      If P is projective, choose a surjection F -> P from a free module F. The
      identity map on P lifts through this surjection, giving a section P -> F,
      hence F is isomorphic to P direct sum ker(pi). Conversely, if F is
      isomorphic to P direct sum Q and F is free, then any lift to F can be
      projected to P, so P inherits the lifting property and is projective.
    required_ingredients:
      - lifting property
      - splitting of surjections
    common_failure_modes:
      - invoking bases for projective modules without justification
  - msc_code: 17B05
    source_id: humphreys-lie
    title: Nilpotent Lie algebras have nontrivial center
    difficulty_stage: phd
    reviewer_score: 3.4
    problem_type: proof_strategy
    answer_format: proof_outline
    statement_body: >
      Let g be a nonzero finite-dimensional nilpotent Lie algebra. Explain why
      its center Z(g) is nonzero.
    prerequisites_assumed:
      - Lie algebras
      - lower central series
      - center of a Lie algebra
    success_criteria: >
      The answer should use the terminating lower central series to identify a
      last nonzero term whose bracket with g vanishes, placing that term inside
      the center.
    required_elements:
      - define or invoke the lower central series
      - choose the last nonzero term
      - show it lies in the center
    fatal_errors:
      - replacing nilpotent with solvable
      - confusing the derived series with the lower central series without explanation
    outline_summary: >
      Because g is nilpotent, its lower central series g = g_1 supseteq g_2
      supseteq ... with g_{i+1} = [g, g_i] eventually reaches zero. Let g_k be
      the last nonzero term. Then [g, g_k] = g_{k+1} = 0, so every element of
      g_k commutes with g and g_k is contained in Z(g). Since g_k is nonzero, so
      is the center.
    required_ingredients:
      - lower central series
    common_failure_modes:
      - using Engel's theorem without making the central-series argument explicit
  - msc_code: 18C15
    source_id: mac-lane
    title: Every adjunction yields a monad
    difficulty_stage: phd
    reviewer_score: 3.3
    problem_type: construction
    answer_format: structured_bullets
    statement_body: >
      Let F: C -> D be left adjoint to U: D -> C with unit eta and counit
      epsilon. Explain how to construct the monad on C associated to this
      adjunction, and state the formulas for its unit and multiplication.
    prerequisites_assumed:
      - adjoint functors
      - unit and counit of an adjunction
      - monads
    success_criteria: >
      The answer should identify the endofunctor UF, take eta as the unit, and
      define multiplication by U epsilon F, with a brief indication that the
      monad axioms follow from the triangle identities.
    required_elements:
      - specify the endofunctor
      - specify the unit natural transformation
      - specify the multiplication natural transformation
    fatal_errors:
      - putting the monad on D instead of C
      - reversing the roles of unit and counit
    outline_summary: >
      The associated monad is T = U F on C. Its unit is the adjunction unit eta:
      Id_C -> U F. Its multiplication is mu = U epsilon F: U F U F -> U F. The
      monad axioms are exactly the adjunction triangle identities transported
      through these formulas.
    required_ingredients:
      - unit and counit of an adjunction
      - triangle identities
    common_failure_modes:
      - writing F U instead of U F
  - msc_code: 20D15
    source_id: rotman-groups
    title: Finite p-groups have nontrivial center
    difficulty_stage: advanced_graduate
    reviewer_score: 3.0
    problem_type: proof_strategy
    answer_format: proof_outline
    statement_body: >
      Let G be a finite p-group. Explain why Z(G) is nontrivial.
    prerequisites_assumed:
      - finite groups
      - conjugacy classes
      - class equation
    success_criteria: >
      The answer should use the class equation to show that the contribution of
      the noncentral conjugacy classes is divisible by p, forcing |Z(G)| to be
      divisible by p and therefore greater than 1.
    required_elements:
      - write the class equation
      - use divisibility of noncentral conjugacy class sizes by p
      - conclude that the center has size divisible by p
    fatal_errors:
      - assuming the group is abelian
      - omitting why noncentral class sizes are divisible by p
    outline_summary: >
      In a finite p-group, the size of every conjugacy class equals the index of
      a centralizer and hence is a power of p. For noncentral elements that size
      is greater than 1, so it is divisible by p. The class equation therefore
      writes |G| as |Z(G)| plus multiples of p. Since |G| itself is a power of p,
      |Z(G)| is divisible by p, so the center is nontrivial.
    required_ingredients:
      - class equation
    common_failure_modes:
      - confusing coset sizes with conjugacy class sizes
  - msc_code: 22A05
    source_id: hofmann-morris
    title: Compact subgroups are closed in Hausdorff topological groups
    difficulty_stage: advanced_graduate
    reviewer_score: 3.0
    problem_type: theorem_applicability
    answer_format: short_justification
    statement_body: >
      Let G be a Hausdorff topological group and H a compact subgroup. Explain
      why H is closed in G.
    prerequisites_assumed:
      - Hausdorff spaces
      - compactness
      - topological groups
    success_criteria: >
      The answer should use the general fact that compact subsets of Hausdorff
      spaces are closed, noting that a subgroup being compact is enough.
    required_elements:
      - identify the Hausdorff plus compactness implication
    fatal_errors:
      - using subgroup structure in place of the topology
    outline_summary: >
      Every compact subset of a Hausdorff space is closed. Since G is Hausdorff
      and H is compact as a subset, H is closed. No additional group-theoretic
      input is required beyond viewing H as a subset of G.
    required_ingredients:
      - compact subsets are closed in Hausdorff spaces
    common_failure_modes:
      - trying to prove normality or completeness instead of closedness
  - msc_code: 26A15
    source_id: rudin-pma
    title: Uniform continuity on a compact interval
    difficulty_stage: advanced_graduate
    reviewer_score: 2.7
    problem_type: theorem_applicability
    answer_format: short_justification
    statement_body: >
      Let f: [a, b] -> R be continuous. Explain why f is uniformly continuous on
      [a, b].
    prerequisites_assumed:
      - continuity
      - compactness
      - uniform continuity
    success_criteria: >
      The answer should invoke the Heine-Cantor theorem or provide the standard
      compactness contradiction argument.
    required_elements:
      - use compactness of [a, b]
      - explain why pointwise continuity upgrades to a global delta
    fatal_errors:
      - giving an argument that works only on open intervals
    outline_summary: >
      The interval [a, b] is compact, and a continuous map from a compact metric
      space to a metric space is uniformly continuous. Equivalently, if uniform
      continuity failed one could construct sequences x_n, y_n with |x_n - y_n|
      -> 0 but |f(x_n) - f(y_n)| bounded away from zero, contradicting continuity
      at a convergent subsequence point.
    required_ingredients:
      - compactness of closed bounded intervals
    common_failure_modes:
      - asserting bounded derivative without such a hypothesis
  - msc_code: 28A20
    source_id: folland-real
    title: Monotone convergence as a theorem-applicability check
    difficulty_stage: advanced_graduate
    reviewer_score: 3.1
    problem_type: theorem_applicability
    answer_format: proof_outline
    statement_body: >
      Let (f_n) be a sequence of nonnegative measurable functions with
      f_n(x) increasing pointwise to f(x). Explain why
      integral f_n dmu increases to integral f dmu.
    prerequisites_assumed:
      - measurable functions
      - Lebesgue integral
      - monotone convergence theorem
    success_criteria: >
      The answer should identify the hypotheses of the monotone convergence
      theorem and conclude convergence of the integrals.
    required_elements:
      - note measurability and pointwise monotone increase
      - note nonnegativity
      - invoke monotone convergence correctly
    fatal_errors:
      - replacing monotone convergence by dominated convergence without a dominating function
      - forgetting nonnegativity
    outline_summary: >
      The monotone convergence theorem applies exactly to nonnegative measurable
      functions increasing pointwise to a measurable limit. Therefore the
      integrals of f_n form an increasing sequence and converge to the integral
      of f.
    required_ingredients:
      - monotone convergence theorem
    common_failure_modes:
      - discussing almost-everywhere convergence without checking monotonicity
  - msc_code: 30D20
    source_id: conway-complex
    title: Liouville's theorem for bounded entire functions
    difficulty_stage: advanced_graduate
    reviewer_score: 3.0
    problem_type: proof_strategy
    answer_format: proof_outline
    statement_body: >
      Let f be an entire function on C and suppose |f(z)| <= M for all z in C.
      Explain why f must be constant.
    prerequisites_assumed:
      - Cauchy integral formula
      - entire functions
    success_criteria: >
      The answer should use Cauchy estimates to show that f'(z_0) = 0 for every
      z_0 and then conclude constancy.
    required_elements:
      - apply Cauchy estimates on large circles
      - let the radius tend to infinity
      - conclude all first derivatives vanish
    fatal_errors:
      - using the maximum modulus principle without explaining the global step
    outline_summary: >
      Fix z_0 and apply the Cauchy estimate to f on a circle of radius R centered
      at z_0: |f'(z_0)| <= M / R. Since R is arbitrary, letting R -> infinity
      gives f'(z_0) = 0. Hence f' is identically zero and f is constant.
    required_ingredients:
      - Cauchy estimates
    common_failure_modes:
      - confusing bounded entire with bounded on one disk
  - msc_code: 31B05
    source_id: ransford-potential
    title: Interior maxima force harmonic functions to be constant
    difficulty_stage: advanced_graduate
    reviewer_score: 3.1
    problem_type: theorem_applicability
    answer_format: short_justification
    statement_body: >
      Let u be harmonic on a connected open set Omega in R^n. Suppose u attains
      a maximum at an interior point of Omega. Explain why u is constant.
    prerequisites_assumed:
      - harmonic functions
      - maximum principle
    success_criteria: >
      The answer should invoke the strong maximum principle for harmonic
      functions and note connectedness.
    required_elements:
      - identify the strong maximum principle
      - use connectedness of the domain
    fatal_errors:
      - citing only a boundary maximum principle
    outline_summary: >
      The strong maximum principle says that a harmonic function on a connected
      open set cannot achieve a strict interior maximum unless it is constant.
      Since u does attain an interior maximum, the only possibility is that u is
      constant on Omega.
    required_ingredients:
      - strong maximum principle
    common_failure_modes:
      - treating subharmonic and harmonic cases as identical without comment
  - msc_code: 32D20
    source_id: krantz-scv
    title: Isolated singularities disappear in several complex variables
    difficulty_stage: phd
    reviewer_score: 3.8
    problem_type: theorem_applicability
    answer_format: proof_outline
    statement_body: >
      Let n >= 2 and let f be holomorphic on B(0, 1) \\ {0} in C^n. Explain why
      f extends holomorphically across 0.
    prerequisites_assumed:
      - holomorphic functions in several complex variables
      - Hartogs extension phenomenon
    success_criteria: >
      The answer should identify this as a Hartogs removable singularity
      phenomenon specific to dimension at least 2 and conclude existence of a
      holomorphic extension to the whole ball.
    required_elements:
      - mention that n >= 2 is essential
      - identify Hartogs extension or an equivalent theorem
    fatal_errors:
      - applying one-variable isolated singularity trichotomy directly
      - omitting the role of dimension
    outline_summary: >
      In several complex variables with n >= 2, isolated singularities are
      removable: Hartogs' theorem implies any function holomorphic on a punctured
      ball extends holomorphically to the full ball. The puncture at the origin
      therefore causes no genuine singularity.
    required_ingredients:
      - Hartogs extension theorem
    common_failure_modes:
      - treating the statement as false because of one-variable examples like 1/z
  - msc_code: 34A12
    source_id: teschl-ode
    title: Local uniqueness from a Lipschitz condition
    difficulty_stage: advanced_graduate
    reviewer_score: 3.2
    problem_type: theorem_applicability
    answer_format: proof_outline
    statement_body: >
      Consider the initial value problem x'(t) = F(t, x(t)), x(t_0) = x_0. Assume
      F is continuous in t and locally Lipschitz in x near (t_0, x_0). Explain
      why the problem has at most one local solution through (t_0, x_0).
    prerequisites_assumed:
      - initial value problems
